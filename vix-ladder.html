<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIX Regime Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surf: #0f0f18;
    --surf2: #141420;
    --surf3: #1a1a28;
    --border: #1e1e30;
    --border2: #252538;
    --text: #e0e0f0;
    --muted: #8b90b8;
    --dim: #2a2a40;

    --r0: #00c896;   /* <15  calm */
    --r1: #4fc3f7;   /* 15-20 normal */
    --r2: #ffd54f;   /* 20-28 caution */
    --r3: #ff8a65;   /* 28-36 defensive */
    --r4: #ef5350;   /* >36  full stop */

    --regime-color: var(--r1);
    --budget: 8000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Familjen Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .page { max-width: 1000px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── Header ── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 24px;
    margin-bottom: 36px;
  }

  .header-eyebrow {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  .header h1 .regime-word {
    color: var(--regime-color);
    transition: color 0.4s ease;
  }

  .budget-box {
    background: var(--surf);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 14px 18px;
    text-align: right;
    min-width: 160px;
  }

  .budget-label {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .budget-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px dashed var(--dim);
    display: inline-block;
  }

  .budget-val:hover { border-color: var(--regime-color); color: var(--regime-color); }

  .io-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 6px;
    display: block;
    width: 100%;
    text-align: center;
  }

  .io-btn:hover { color: var(--regime-color); border-color: var(--regime-color); background: rgba(255,255,255,0.03); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 18px;
    font-family: 'Azeret Mono', monospace;
    font-size: 12px;
    color: var(--text);
    z-index: 300;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  .budget-input {
    font-size: 20px;
    font-weight: 700;
    background: none;
    border: none;
    border-bottom: 1px solid var(--regime-color);
    color: var(--regime-color);
    outline: none;
    width: 120px;
    text-align: right;
    font-family: 'Familjen Grotesk', sans-serif;
    display: none;
  }

  /* ── VIX Input ── */
  .vix-section {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Regime glow */
  .vix-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--regime-color);
    transition: background 0.4s ease;
  }

  .vix-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: center;
  }

  .vix-input-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .vix-label {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .vix-number-input {
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Familjen Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    width: 110px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .vix-number-input::-webkit-inner-spin-button,
  .vix-number-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .vix-number-input:focus { border-color: var(--regime-color); }

  /* VIX slider */
  .vix-slider-wrap { flex: 1; min-width: 200px; }

  .vix-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    background: linear-gradient(to right,
      var(--r0) 0%, var(--r0) 20%,
      var(--r1) 20%, var(--r1) 37%,
      var(--r2) 37%, var(--r2) 60%,
      var(--r3) 60%, var(--r3) 80%,
      var(--r4) 80%, var(--r4) 100%
    );
  }

  .vix-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--regime-color);
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px var(--regime-color);
    transition: background 0.3s, box-shadow 0.3s;
  }

  /* Regime badge */
  .regime-badge {
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 14px 20px;
    text-align: center;
    min-width: 160px;
    transition: border-color 0.4s;
  }

  .regime-badge-label {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .regime-badge-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--regime-color);
    transition: color 0.4s;
    line-height: 1.1;
  }

  .regime-badge-range {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* VIX ladder visual */
  .vix-ladder-visual {
    display: flex;
    gap: 4px;
    margin-top: 20px;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
  }

  .ladder-seg {
    flex: 1;
    border-radius: 1px;
    opacity: 0.3;
    transition: opacity 0.3s, transform 0.3s;
  }

  .ladder-seg.active {
    opacity: 1;
    transform: scaleY(1.5);
  }

  /* ── Regime Panel ── */
  .regime-panel {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .regime-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surf2);
  }

  .regime-icon {
    font-size: 22px;
  }

  .regime-title {
    font-size: 16px;
    font-weight: 600;
  }

  .regime-subtitle {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Rules grid */
  .rules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .rule-cell {
    padding: 18px 22px;
    border-right: 1px solid var(--border);
  }

  .rule-cell:last-child { border-right: none; }

  .rule-cell-label {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .rule-cell-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--regime-color);
    transition: color 0.4s;
    line-height: 1;
    margin-bottom: 4px;
  }

  .rule-cell-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ── Budget Breakdown ── */
  .budget-breakdown {
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
  }

  .bb-title {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .bb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .bb-card {
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 12px 14px;
  }

  .bb-card-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .bb-card-val   { font-size: 18px; font-weight: 700; }

  /* ── Ticker Section ── */
  .ticker-section {
    padding: 20px 22px;
  }

  .ticker-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: gap;
    gap: 10px;
  }

  .ticker-section-title {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .add-ticker-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .add-ticker-btn:hover { color: var(--regime-color); border-color: var(--regime-color); }

  /* Ticker table */
  .ticker-table {
    width: 100%;
    border-collapse: collapse;
  }

  .ticker-table th {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .ticker-table th.right { text-align: right; }

  .ticker-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  .ticker-table tr:last-child td { border-bottom: none; }
  .ticker-table tr:hover td { background: var(--surf2); }

  .td-symbol {
    font-weight: 700;
    font-size: 15px;
    font-family: 'Azeret Mono', monospace;
  }

  .td-sector {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: 8px;
    font-family: 'Azeret Mono', monospace;
    vertical-align: middle;
  }

  .td-right { text-align: right; }

  .td-alloc {
    font-weight: 600;
    font-size: 14px;
    text-align: right;
  }

  .td-contracts { text-align: right; color: var(--muted); font-size: 12px; }

  .priority-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  .remove-row-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
  }

  .remove-row-btn:hover { color: #ef5350; }

  /* Empty tickers */
  .no-tickers {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Add ticker row ── */
  .add-row {
    display: none;
    gap: 8px;
    align-items: center;
    padding: 12px 0 4px;
    flex-wrap: wrap;
  }

  .add-row.visible { display: flex; }

  .add-row input, .add-row select {
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Familjen Grotesk', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus, .add-row select:focus { border-color: var(--regime-color); }
  .add-row select option { background: var(--surf2); }

  .add-row-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-row-btn.confirm { background: var(--regime-color); border-color: var(--regime-color); color: #09090f; }
  .add-row-btn.confirm:hover { opacity: 0.85; }

  /* ── Regime Alert ── */
  .regime-alert {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted);
  }

  .alert-icon { flex-shrink: 0; font-size: 16px; }

  /* ── Regime dots nav ── */
  .regime-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .regime-nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .regime-nav-btn:hover { background: var(--surf2); color: var(--text); }
  .regime-nav-btn.active { border-color: var(--regime-color); color: var(--regime-color); background: rgba(255,255,255,0.03); }

  .rnb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  @media (max-width: 600px) {
    .vix-row { grid-template-columns: 1fr; }
    .header { grid-template-columns: 1fr; }
    .rules-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-eyebrow">Bull Put Spread System · Weekly Decision Engine</div>
      <h1>VIX <span class="regime-word" id="regime-word">Regime</span><br>Ladder</h1>
    </div>
    <div class="budget-box">
      <div class="budget-label">Weekly Risk Budget</div>
      <div class="budget-val" id="budget-display" onclick="editBudget()">$8,000</div>
      <input class="budget-input" id="budget-input" type="number" value="8000"
             onblur="commitBudget()" onkeydown="if(event.key==='Enter') commitBudget()">
      <button class="io-btn" onclick="exportData()">↓ Export</button>
      <button class="io-btn" onclick="document.getElementById('import-input').click()">↑ Import</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- VIX Input -->
  <div class="vix-section" id="vix-section">
    <div class="vix-row">
      <div class="vix-input-wrap">
        <div class="vix-label">Current VIX</div>
        <input class="vix-number-input" id="vix-input" type="number"
               min="5" max="80" step="0.1" value="17"
               oninput="syncFromNumber()" onchange="syncFromNumber()">
        <div class="vix-slider-wrap">
          <input class="vix-slider" id="vix-slider" type="range"
                 min="5" max="60" step="0.5" value="17"
                 oninput="syncFromSlider()">
        </div>
        <button id="fetch-vix-btn" onclick="fetchVix()" style="
          font-family:'Azeret Mono',monospace;
          font-size:10px;
          letter-spacing:0.1em;
          text-transform:uppercase;
          padding:8px 14px;
          border-radius:4px;
          border:1px solid var(--border2);
          background:none;
          color:var(--muted);
          cursor:pointer;
          transition:all 0.15s;
          white-space:nowrap;
          flex-shrink:0;
        " onmouseover="this.style.color='var(--regime-color)';this.style.borderColor='var(--regime-color)'"
           onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border2)'">
          ⟳ Fetch Live
        </button>
      </div>
      <div class="regime-badge" id="regime-badge">
        <div class="regime-badge-label">Regime</div>
        <div class="regime-badge-name" id="regime-badge-name">—</div>
        <div class="regime-badge-range" id="regime-badge-range">—</div>
      </div>
    </div>
    <div id="vix-fetch-status" style="
      font-family:'Azeret Mono',monospace;
      font-size:10px;
      letter-spacing:0.1em;
      color:var(--muted);
      margin-top:10px;
      min-height:14px;
    "></div>
    <div class="vix-ladder-visual" id="ladder-visual">
      <div class="ladder-seg" style="background:var(--r0); flex:2" data-regime="0"></div>
      <div class="ladder-seg" style="background:var(--r1); flex:1.5" data-regime="1"></div>
      <div class="ladder-seg" style="background:var(--r2); flex:2" data-regime="2"></div>
      <div class="ladder-seg" style="background:var(--r3); flex:2" data-regime="3"></div>
      <div class="ladder-seg" style="background:var(--r4); flex:3" data-regime="4"></div>
    </div>
  </div>

  <!-- Quick regime nav -->
  <div class="regime-nav" id="regime-nav"></div>

  <!-- Main panel -->
  <div class="regime-panel" id="regime-panel"></div>

</div>

<script>
// ── Sector colors (match watchlist) ──
const SECTOR_COLORS = {
  tech:'#4f8ef7', health:'#3ecf8e', finance:'#f5a623', energy:'#e85d4a',
  consumer:'#a78bfa', staples:'#34d399', industrial:'#38bdf8',
  materials:'#fb923c', utilities:'#34d399', reits:'#f472b6', comm:'#facc15'
};
const SECTOR_LABELS = {
  tech:'Tech', health:'Health', finance:'Finance', energy:'Energy',
  consumer:'Consumer', staples:'Staples', industrial:'Industrial',
  materials:'Materials', utilities:'Utilities', reits:'REITs', comm:'Comm'
};

// ── Regime definitions ──
const REGIMES = [
  {
    id: 0, label: 'CALM', name: 'Full Deployment', range: 'VIX < 15',
    color: '#00c896', icon: '🟢',
    budgetPct: 1.0,
    maxPositions: 8, deltaTarget: '0.05–0.08', dteTarget: '7–14',
    spreadWidth: '$5–$10', sectors: 4,
    rules: [
      { label: 'Deploy', val: '100%', sub: 'of weekly budget' },
      { label: 'Max positions', val: '8', sub: 'across 4+ sectors' },
      { label: 'Delta target', val: '0.05–0.08', sub: 'normal range' },
      { label: 'DTE', val: '7–14 days', sub: 'weekly expiries' },
    ],
    tickers: ['AAPL','MSFT','NVDA','META','AMGN','JPM','UNH','CAT'],
    alert: 'Low VIX means low premium — compensate with higher position count and slightly wider strikes. Do not push delta above 0.10 just to collect more.',
  },
  {
    id: 1, label: 'NORMAL', name: 'Normal Operations', range: 'VIX 15–20',
    color: '#4fc3f7', icon: '🔵',
    budgetPct: 1.0,
    maxPositions: 7, deltaTarget: '0.05–0.08', dteTarget: '7–21',
    spreadWidth: '$5–$10', sectors: 4,
    rules: [
      { label: 'Deploy', val: '100%', sub: 'of weekly budget' },
      { label: 'Max positions', val: '7', sub: 'across 3–4 sectors' },
      { label: 'Delta target', val: '0.05–0.08', sub: 'sweet spot' },

// ── State ──
let weeklyBudget = 8000;
let currentRegimeId = 1;

// Tickers per regime — start from watchlist data then allow overrides
const WATCHLIST_KEY = 'spreadwatch-tickers';
let regimeTickers = {}; // regimeId -> [{symbol, sector, priority, price, delta}]

function loadWatchlist() {
  const raw = localStorage.getItem(WATCHLIST_KEY);
  if (!raw) return null;
  return JSON.parse(raw);
}

function initRegimeTickers() {
  const wl = loadWatchlist();

  REGIMES.forEach(r => {
    const key = 'vixladder-tickers-' + r.id;
    const saved = localStorage.getItem(key);
    if (saved) {
      regimeTickers[r.id] = JSON.parse(saved);
      return;
    }

    // Build from watchlist if available, else use defaults
    if (wl) {
      const active = wl.filter(t => t.status !== 'avoid');
      // Map regime default symbols to watchlist entries
      const mapped = r.tickers.map(sym => {
        const match = active.find(t => t.symbol === sym);
        return {
          symbol: sym,
          sector: match ? match.sector : 'tech',
          priority: match ? (match.status === 'active' ? 'high' : match.status === 'watching' ? 'med' : 'low') : 'med',
          price: match ? (match.price || '—') : '—',
          delta: match ? (match.delta || '0.06') : '0.06',
          name: match ? match.name : sym,
        };
      });
      regimeTickers[r.id] = mapped;
    } else {
      regimeTickers[r.id] = r.tickers.map(sym => ({
        symbol: sym, sector: 'tech', priority: 'med', price: '—', delta: '0.06', name: sym
      }));
    }
    saveRegimeTickers(r.id);
  });
}

function saveRegimeTickers(regimeId) {
  localStorage.setItem('vixladder-tickers-' + regimeId, JSON.stringify(regimeTickers[regimeId]));
}

// ── VIX → Regime ──
function vixToRegime(v) {
  if (v < 15)  return 0;
  if (v < 20)  return 1;
  if (v < 28)  return 2;
  if (v < 36)  return 3;
  return 4;
}

function getRegimeColor(id) {
  return ['#00c896','#4fc3f7','#ffd54f','#ff8a65','#ef5350'][id];
}

// ── Live VIX Fetch ──
async function fetchVix() {
  const btn = document.getElementById('fetch-vix-btn');
  const status = document.getElementById('vix-fetch-status');
  btn.textContent = '⟳ Fetching...';
  btn.disabled = true;
  status.style.color = 'var(--muted)';
  status.textContent = 'Fetching live VIX...';

  // Try stooq (CORS-friendly, no key required)
  try {
    const res = await fetch('https://stooq.com/q/l/?s=%5EVIX&f=sd2t2ohlcv&h&e=csv', { cache: 'no-cache' });
    if (res.ok) {
      const text = await res.text();
      const lines = text.trim().split('\n');
      if (lines.length >= 2) {
        const cols = lines[1].split(',');
        const close = parseFloat(cols[6]); // close price column
        if (!isNaN(close) && close > 0) {
          setVixValue(close);
          status.style.color = 'var(--r' + vixToRegime(close) + ')';
          status.textContent = `✓ Live VIX: ${close.toFixed(2)} — fetched from CBOE via stooq · ${new Date().toLocaleTimeString()}`;
          btn.textContent = '⟳ Fetch Live';
          btn.disabled = false;
          return;
        }
      }
    }
  } catch(e) { /* fall through to next source */ }

  // Fallback: Yahoo Finance via allorigins proxy
  try {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=1d';
    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { cache: 'no-cache' });
    if (res.ok) {
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents);
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price && !isNaN(price)) {
        setVixValue(price);
        status.style.color = 'var(--r' + vixToRegime(price) + ')';
        status.textContent = `✓ Live VIX: ${price.toFixed(2)} — fetched via Yahoo Finance · ${new Date().toLocaleTimeString()}`;
        btn.textContent = '⟳ Fetch Live';
        btn.disabled = false;
        return;
      }
    }
  } catch(e) { /* fall through */ }

  // Both failed
  status.style.color = 'var(--r4)';
  status.textContent = '✗ Could not fetch live VIX — enter manually or try again';
  btn.textContent = '⟳ Fetch Live';
  btn.disabled = false;
}

function setVixValue(v) {
  const rounded = Math.round(v * 10) / 10;
  document.getElementById('vix-input').value = rounded;
  document.getElementById('vix-slider').value = Math.min(rounded, 60);
  updateRegime(rounded);
}

// ── Sync inputs ──
function syncFromSlider() {
  const v = parseFloat(document.getElementById('vix-slider').value);
  document.getElementById('vix-input').value = v.toFixed(1);
  updateRegime(v);
}

function syncFromNumber() {
  let v = parseFloat(document.getElementById('vix-input').value);
  if (isNaN(v)) return;
  v = Math.max(5, Math.min(80, v));
  document.getElementById('vix-slider').value = Math.min(v, 60);
  updateRegime(v);
}

// ── Update everything ──
function updateRegime(vix) {
  const rid = vixToRegime(vix);
  const regime = REGIMES[rid];
  const col = regime.color;

  // CSS variable
  document.documentElement.style.setProperty('--regime-color', col);
  currentRegimeId = rid;

  // Header word
  document.getElementById('regime-word').textContent = regime.label;

  // Badge
  document.getElementById('regime-badge-name').textContent = regime.name;
  document.getElementById('regime-badge-range').textContent = regime.range;

  // Ladder segments
  document.querySelectorAll('.ladder-seg').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.regime) === rid);
  });

  // Nav buttons
  document.querySelectorAll('.regime-nav-btn').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.regime) === rid);
  });

  // Main panel
  renderPanel(regime);
}

// ── Render main panel ──
function renderPanel(regime) {
  const budget = weeklyBudget;
  const deployable = Math.round(budget * regime.budgetPct);
  const perPosition = regime.maxPositions > 0
    ? Math.round(deployable / regime.maxPositions)
    : 0;
  const tickers = regimeTickers[regime.id] || [];

  const priorityColor = { high: regime.color, med: '#888', low: '#444' };
  const priorityLabel = { high: 'HIGH', med: 'MED', low: 'LOW' };

  // Allocation per ticker
  const allocPerTicker = tickers.length > 0 && deployable > 0
    ? Math.round(deployable / tickers.length)
    : 0;

  const tickerRows = tickers.length === 0
    ? `<tr><td colspan="6" class="no-tickers">No tickers for this regime — add from watchlist or manually</td></tr>`
    : tickers.map((t, i) => {
        const sc = SECTOR_COLORS[t.sector] || '#666';
        const sl = SECTOR_LABELS[t.sector] || t.sector;
        const pc = priorityColor[t.priority] || '#888';
        const pl = priorityLabel[t.priority] || 'MED';
        const alloc = allocPerTicker;
        // Rough contracts estimate: alloc / (spread width $5 * 100)
        const contracts = alloc > 0 ? Math.max(1, Math.floor(alloc / 500)) : '—';
        return `<tr>
          <td>
            <span class="priority-dot" style="background:${pc}"></span>
            <span class="td-symbol">${t.symbol}</span>
            <span class="td-sector" style="background:${sc}22;color:${sc}">${sl}</span>
          </td>
          <td style="color:var(--muted);font-size:12px;">${t.name || '—'}</td>
          <td style="text-align:center;font-family:'Azeret Mono',monospace;font-size:12px;">${t.delta || '0.06'}</td>
          <td class="td-right" style="font-family:'Azeret Mono',monospace;font-size:11px;color:${pc}">${pl}</td>
          <td class="td-alloc" style="color:${regime.color}">$${alloc.toLocaleString()}</td>
          <td class="td-contracts">
            ~${contracts} contracts
            <button class="remove-row-btn" onclick="removeTicker(${regime.id}, ${i})" title="Remove">×</button>
          </td>
        </tr>`;
      }).join('');

  // Watchlist candidates not in this regime
  const wl = loadWatchlist();
  const wlOptions = wl
    ? wl.filter(t => t.status !== 'avoid' && !tickers.find(r => r.symbol === t.symbol))
        .map(t => `<option value="${t.symbol}|${t.sector}|${t.delta||'0.06'}|${t.name||t.symbol}">${t.symbol} — ${t.name||t.symbol}</option>`)
        .join('')
    : '';

  document.getElementById('regime-panel').innerHTML = `
    <div class="regime-header" style="border-left:3px solid ${regime.color}">
      <span class="regime-icon">${regime.icon}</span>
      <div>
        <div class="regime-title" style="color:${regime.color}">${regime.range} · ${regime.name}</div>
        <div class="regime-subtitle">Weekly operating rules for this regime</div>
      </div>
    </div>

    <div class="rules-grid">
      ${regime.rules.map(r => `
        <div class="rule-cell">
          <div class="rule-cell-label">${r.label}</div>
          <div class="rule-cell-val" style="color:${regime.color}">${r.val}</div>
          <div class="rule-cell-sub">${r.sub}</div>
        </div>`).join('')}
    </div>

    <div class="budget-breakdown">
      <div class="bb-title">Budget Allocation · $${budget.toLocaleString()} weekly</div>
      <div class="bb-grid">
        <div class="bb-card">
          <div class="bb-card-label">Deployable this week</div>
          <div class="bb-card-val" style="color:${regime.color}">$${deployable.toLocaleString()}</div>
        </div>
        <div class="bb-card">
          <div class="bb-card-label">Max positions</div>
          <div class="bb-card-val">${regime.maxPositions || '—'}</div>
        </div>
        <div class="bb-card">
          <div class="bb-card-label">Risk per position</div>
          <div class="bb-card-val">${perPosition > 0 ? '$' + perPosition.toLocaleString() : '—'}</div>
        </div>
        <div class="bb-card">
          <div class="bb-card-label">Hold in cash</div>
          <div class="bb-card-val">$${(budget - deployable).toLocaleString()}</div>
        </div>
      </div>
    </div>

    ${regime.maxPositions > 0 ? `
    <div class="ticker-section">
      <div class="ticker-section-header">
        <div class="ticker-section-title">Recommended Tickers · ${regime.range}</div>
        <button class="add-ticker-btn" onclick="toggleAddRow(${regime.id})">+ Add Ticker</button>
      </div>

      <table class="ticker-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Name</th>
            <th style="text-align:center">Delta</th>
            <th class="right">Priority</th>
            <th class="right">Allocation</th>
            <th class="right">Est. Size</th>
          </tr>
        </thead>
        <tbody id="ticker-tbody-${regime.id}">${tickerRows}</tbody>
      </table>

      <div class="add-row" id="add-row-${regime.id}">
        <select id="ar-wl-${regime.id}" style="flex:2;min-width:180px">
          <option value="">— From watchlist —</option>
          ${wlOptions}
        </select>
        <input id="ar-sym-${regime.id}" placeholder="Or type symbol" style="width:90px;text-transform:uppercase">
        <select id="ar-sector-${regime.id}" style="width:110px">
          ${Object.entries(SECTOR_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
        <input id="ar-delta-${regime.id}" placeholder="Delta" style="width:70px" value="0.06">
        <select id="ar-priority-${regime.id}" style="width:90px">
          <option value="high">High</option>
          <option value="med" selected>Med</option>
          <option value="low">Low</option>
        </select>
        <button class="add-row-btn confirm" onclick="confirmAddTicker(${regime.id})">Add</button>
        <button class="add-row-btn" onclick="toggleAddRow(${regime.id})">Cancel</button>
      </div>
    </div>` : ''}

    <div class="regime-alert">
      <span class="alert-icon">⚠</span>
      <span>${regime.alert}</span>
    </div>
  `;
}

// ── Ticker management ──
function toggleAddRow(regimeId) {
  const row = document.getElementById('add-row-' + regimeId);
  row.classList.toggle('visible');
  if (row.classList.contains('visible')) {
    document.getElementById('ar-sym-' + regimeId).focus();
  }
}

function confirmAddTicker(regimeId) {
  // Check watchlist select first
  const wlSel = document.getElementById('ar-wl-' + regimeId).value;
  let symbol, sector, delta, name;

  if (wlSel) {
    const parts = wlSel.split('|');
    symbol = parts[0]; sector = parts[1]; delta = parts[2]; name = parts[3];
  } else {
    symbol = document.getElementById('ar-sym-' + regimeId).value.trim().toUpperCase();
    sector = document.getElementById('ar-sector-' + regimeId).value;
    delta  = document.getElementById('ar-delta-' + regimeId).value.trim();
    name   = symbol;
  }

  if (!symbol) return;

  const priority = document.getElementById('ar-priority-' + regimeId).value;

  if (!regimeTickers[regimeId]) regimeTickers[regimeId] = [];
  if (regimeTickers[regimeId].find(t => t.symbol === symbol)) return; // dupe

  regimeTickers[regimeId].push({ symbol, sector, priority, delta: delta || '0.06', name, price: '—' });
  saveRegimeTickers(regimeId);
  renderPanel(REGIMES[regimeId]);
}

function removeTicker(regimeId, idx) {
  regimeTickers[regimeId].splice(idx, 1);
  saveRegimeTickers(regimeId);
  renderPanel(REGIMES[regimeId]);
}

// ── Budget editing ──
function editBudget() {
  document.getElementById('budget-display').style.display = 'none';
  const inp = document.getElementById('budget-input');
  inp.style.display = 'inline-block';
  inp.value = weeklyBudget;
  inp.focus();
  inp.select();
}

function commitBudget() {
  const v = parseInt(document.getElementById('budget-input').value);
  if (!isNaN(v) && v > 0) weeklyBudget = v;
  document.getElementById('budget-display').textContent = '$' + weeklyBudget.toLocaleString();
  document.getElementById('budget-display').style.display = 'inline-block';
  document.getElementById('budget-input').style.display = 'none';
  localStorage.setItem('vixladder-budget', weeklyBudget);
  updateRegime(parseFloat(document.getElementById('vix-input').value));
}

// ── Export / Import ──
function exportData() {
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    budget: weeklyBudget,
    regimeTickers,
    watchlist: JSON.parse(localStorage.getItem('spreadwatch-tickers') || 'null'),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vixladder-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Ladder data exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      if (!confirm('Import ladder settings? This will replace current regime tickers and budget.')) return;
      if (payload.budget) {
        weeklyBudget = payload.budget;
        document.getElementById('budget-display').textContent = '$' + weeklyBudget.toLocaleString();
        localStorage.setItem('vixladder-budget', weeklyBudget);
      }
      if (payload.regimeTickers) {
        Object.entries(payload.regimeTickers).forEach(([rid, tickers]) => {
          regimeTickers[parseInt(rid)] = tickers;
          saveRegimeTickers(parseInt(rid));
        });
      }
      if (payload.watchlist) {
        localStorage.setItem('spreadwatch-tickers', JSON.stringify(payload.watchlist));
      }
      updateRegime(parseFloat(document.getElementById('vix-input').value));
      showToast('✓ Ladder data imported');
    } catch {
      showToast('✗ Invalid file — import failed');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Build nav buttons ──
function buildNav() {
  const nav = document.getElementById('regime-nav');
  nav.innerHTML = REGIMES.map(r => `
    <button class="regime-nav-btn" data-regime="${r.id}"
            onclick="jumpToRegime(${r.id})">
      <span class="rnb-dot" style="background:${r.color}"></span>
      ${r.label}
    </button>`).join('');
}

function jumpToRegime(rid) {
  const midpoints = [12, 17, 24, 32, 45];
  const v = midpoints[rid];
  document.getElementById('vix-input').value = v;
  document.getElementById('vix-slider').value = Math.min(v, 60);
  updateRegime(v);
}

// ── Init ──
const savedBudget = localStorage.getItem('vixladder-budget');
if (savedBudget) {
  weeklyBudget = parseInt(savedBudget);
  document.getElementById('budget-display').textContent = '$' + weeklyBudget.toLocaleString();
  document.getElementById('budget-input').value = weeklyBudget;
}

initRegimeTickers();
buildNav();
updateRegime(17);
</script>
